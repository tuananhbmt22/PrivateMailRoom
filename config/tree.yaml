# Department Tree Schema
# Defines the classification targets for the AI inference engine.
# Each department has a unique key, display name, destination path, and document subtypes.

confidence_threshold: 0.7

departments:
  parking:
    name: "Parking & Traffic"
    subtypes:
      - fine_tickets
      - image_evidence
      - appeal_papers
      - permits
      - clearway_violations

  hr:
    name: "Human Resources"
    subtypes:
      - leave_applications
      - recruitment
      - complaints
      - performance_reviews
      - onboarding

  waste:
    name: "Waste Management"
    subtypes:
      - collection_requests
      - complaints
      - contractor_reports
      - bin_replacements

  planning:
    name: "Planning & Development"
    subtypes:
      - development_applications
      - building_certificates
      - compliance_notices
      - zoning_requests

  rates:
    name: "Rates & Revenue"
    subtypes:
      - rate_notices
      - payment_receipts
      - objections
      - pensioner_rebates

  environmental:
    name: "Environmental Services"
    subtypes:
      - noise_complaints
      - pollution_reports
      - tree_applications
      - stormwater

  community:
    name: "Community Services"
    subtypes:
      - event_applications
      - facility_bookings
